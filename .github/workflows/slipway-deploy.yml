name: Slipway Deploy
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Dockerfile if missing
        run: |
          if [ ! -f Dockerfile ]; then
            echo "FROM ruby:3.2" > Dockerfile
            echo "WORKDIR /app" >> Dockerfile
            echo "COPY . ." >> Dockerfile
            echo 'CMD ["ruby", "app.rb"]' >> Dockerfile
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/pepito-c/resumesucks:latest
            ghcr.io/pepito-c/resumesucks:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify Slipway
        run: |
          SIGNATURE=$(echo -n '{"image":"ghcr.io/pepito-c/resumesucks:latest","sha":"'$GITHUB_SHA'"}' | openssl dgst -sha256 -hmac "$SLIPWAY_WEBHOOK_SECRET" | awk '{print $2}')
          curl -s -X POST https://app.slipway.cloud/webhooks/image_ready/blmubjl98rqhhkahmk0ml4ow \
            -H "Content-Type: application/json" \
            -H "X-Slipway-Signature: sha256=$SIGNATURE" \
            -d '{"image":"ghcr.io/pepito-c/resumesucks:latest","sha":"'$GITHUB_SHA'"}'
        env:
          SLIPWAY_WEBHOOK_SECRET: ${{ secrets.SLIPWAY_WEBHOOK_SECRET }}
