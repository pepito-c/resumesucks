name: Slipway Deploy
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Notify Slipway build started
        run: |
          RUN_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          PAYLOAD="{"run_url":"$RUN_URL"}"
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "b2ec83329cee276f4fc20140ab5f8b9e4e4e8a22d3b3d52b4df3748b7d88422c" | awk '{print $2}')
          curl -s -X POST https://app.slipway.cloud/webhooks/build_started/kfhf9ki0fbz364c3dhlk30i3 \
            -H "Content-Type: application/json" \
            -H "X-Slipway-Signature: sha256=$SIGNATURE" \
            -d "$PAYLOAD" || true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Dockerfile if missing
        run: |
          if [ ! -f Dockerfile ]; then
            if [ -f package.json ]; then
              printf 'FROM node:18-alpine
WORKDIR /app
COPY package*.json ./
RUN npm ci --omit=dev
COPY . .
CMD ["node", "server.js"]
' > Dockerfile
            elif [ -f Gemfile ]; then
              printf 'FROM ruby:3.3-slim
WORKDIR /app
COPY Gemfile* ./
RUN bundle install
COPY . .
CMD ["bundle", "exec", "ruby", "app.rb"]
' > Dockerfile
            elif [ -f requirements.txt ]; then
              printf 'FROM python:3.11-slim
WORKDIR /app
COPY requirements.txt .
RUN pip install -r requirements.txt
COPY . .
CMD ["python", "app.py"]
' > Dockerfile
            else
              printf 'FROM ubuntu:22.04
WORKDIR /app
COPY . .
' > Dockerfile
            fi
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/pepito-c/resumesucks:latest
            ghcr.io/pepito-c/resumesucks:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify Slipway image ready
        run: |
          PAYLOAD='{"image":"ghcr.io/pepito-c/resumesucks:latest","sha":"'$GITHUB_SHA'"}'
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "b2ec83329cee276f4fc20140ab5f8b9e4e4e8a22d3b3d52b4df3748b7d88422c" | awk '{print $2}')
          curl -f -s -X POST https://app.slipway.cloud/webhooks/image_ready/kfhf9ki0fbz364c3dhlk30i3 \
            -H "Content-Type: application/json" \
            -H "X-Slipway-Signature: sha256=$SIGNATURE" \
            -d "$PAYLOAD"
        # Secret is embedded — no GitHub Actions secret needed

      - name: Notify Slipway build failed
        if: failure()
        run: |
          PAYLOAD='{}'
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "b2ec83329cee276f4fc20140ab5f8b9e4e4e8a22d3b3d52b4df3748b7d88422c" | awk '{print $2}')
          curl -s -X POST https://app.slipway.cloud/webhooks/build_failed/kfhf9ki0fbz364c3dhlk30i3 \
            -H "Content-Type: application/json" \
            -H "X-Slipway-Signature: sha256=$SIGNATURE" \
            -d "$PAYLOAD" || true
