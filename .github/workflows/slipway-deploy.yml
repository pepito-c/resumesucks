name: Slipway Deploy
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Notify Slipway build started
        run: |
          PAYLOAD='{"run_url":"'"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"'"}'
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "584b4a15b302866e3577a82009dc89db7f8ff13f10feee2bb219f17a6a531485" | awk '{print $2}')
          curl -s -X POST https://app.slipway.cloud/webhooks/build_started/xqq5joo5r5papb13o40rusqv \
            -H "Content-Type: application/json" \
            -H "X-Slipway-Signature: sha256=$SIGNATURE" \
            -d "$PAYLOAD" || true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Dockerfile if missing
        run: |
          if [ ! -f Dockerfile ]; then
            echo "FROM ruby:3.2" > Dockerfile
            echo "WORKDIR /app" >> Dockerfile
            echo "COPY . ." >> Dockerfile
            echo 'CMD ["ruby", "app.rb"]' >> Dockerfile
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/pepito-c/resumesucks:latest
            ghcr.io/pepito-c/resumesucks:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify Slipway image ready
        run: |
          PAYLOAD='{"image":"ghcr.io/pepito-c/resumesucks:latest","sha":"'$GITHUB_SHA'"}'
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "584b4a15b302866e3577a82009dc89db7f8ff13f10feee2bb219f17a6a531485" | awk '{print $2}')
          curl -f -s -X POST https://app.slipway.cloud/webhooks/image_ready/xqq5joo5r5papb13o40rusqv \
            -H "Content-Type: application/json" \
            -H "X-Slipway-Signature: sha256=$SIGNATURE" \
            -d "$PAYLOAD"
        # Secret is embedded — no GitHub Actions secret needed

      - name: Notify Slipway build failed
        if: failure()
        run: |
          PAYLOAD='{}'
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "584b4a15b302866e3577a82009dc89db7f8ff13f10feee2bb219f17a6a531485" | awk '{print $2}')
          curl -s -X POST https://app.slipway.cloud/webhooks/build_failed/xqq5joo5r5papb13o40rusqv \
            -H "Content-Type: application/json" \
            -H "X-Slipway-Signature: sha256=$SIGNATURE" \
            -d "$PAYLOAD" || true
