name: Slipway Deploy
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Notify Slipway build started
        run: |
          RUN_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          PAYLOAD=$(printf '{"run_url":"%s"}' "$RUN_URL")
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "7cfba48368c395e806031b5c245a60cc67dba3e63a78dc555a6f4fb93341be78" | awk '{print $2}')
          curl -s -X POST https://app.slipway.cloud/webhooks/build_started/cx9ofr5k8666vk5yd8chgt3q \
            -H "Content-Type: application/json" \
            -H "X-Slipway-Signature: sha256=$SIGNATURE" \
            -d "$PAYLOAD" || true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Dockerfile if missing
        run: |
          if [ -f Dockerfile ]; then exit 0; fi
          if [ -f package.json ]; then
            BASE=node:18-alpine CMD='node server.js'
          elif [ -f Gemfile ]; then
            BASE=ruby:3.3-slim CMD='bundle exec ruby app.rb'
          elif [ -f requirements.txt ]; then
            BASE=python:3.11-slim CMD='python app.py'
          else
            BASE=ubuntu:22.04 CMD=''
          fi
          { echo "FROM $BASE"; echo 'WORKDIR /app'; echo 'COPY . .'; [ -n "$CMD" ] && echo "CMD $CMD"; } > Dockerfile

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/pepito-c/resumesucks:latest
            ghcr.io/pepito-c/resumesucks:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify Slipway image ready
        run: |
          PAYLOAD='{"image":"ghcr.io/pepito-c/resumesucks:latest","sha":"'$GITHUB_SHA'"}'
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "7cfba48368c395e806031b5c245a60cc67dba3e63a78dc555a6f4fb93341be78" | awk '{print $2}')
          curl -f -s -X POST https://app.slipway.cloud/webhooks/image_ready/cx9ofr5k8666vk5yd8chgt3q \
            -H "Content-Type: application/json" \
            -H "X-Slipway-Signature: sha256=$SIGNATURE" \
            -d "$PAYLOAD"
        # Secret is embedded — no GitHub Actions secret needed

      - name: Notify Slipway build failed
        if: failure()
        run: |
          PAYLOAD='{}'
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "7cfba48368c395e806031b5c245a60cc67dba3e63a78dc555a6f4fb93341be78" | awk '{print $2}')
          curl -s -X POST https://app.slipway.cloud/webhooks/build_failed/cx9ofr5k8666vk5yd8chgt3q \
            -H "Content-Type: application/json" \
            -H "X-Slipway-Signature: sha256=$SIGNATURE" \
            -d "$PAYLOAD" || true
